[workspace]
name = "moonshot"
version = "0.1.0"
description = "A minimal Lua package manager built on rattler"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]
preview = ["pixi-build"]

[package.build.backend]
name = "pixi-build-rust"
version = "0.4.*"

[dev]
moonshot = { path = "." }

[dependencies]

[feature.book.dependencies]
python = ">=3.11"

[feature.book.pypi-dependencies]
mkdocs-material = ">=9.0"
mkdocs-redirects = ">=1.2"
entangled-cli = ">=2.0"
mkdocs-entangled-plugin = { git = "https://github.com/tdejager/mkdocs-plugin.git" }
mkdocs-print-site-plugin = ">=2.0"

[feature.book.tasks]
book-build = { cmd = "mkdocs build", cwd = "book" }
book-serve = { cmd = "mkdocs serve", cwd = "book" }
_tangle = { cmd = "entangled tangle", description = "Extract code blocks from the book into source files" }
stitch = { cmd = "entangled stitch", description = "Update the book from source file edits" }
watch = { cmd = "entangled watch", description = "Watch for changes and keep book and source files in sync" }

[tasks]
# Tangle source from book and format
tangle = { cmd = "cargo fmt", depends-on = [
  { task = "_tangle", environment = "book" }
], description = "Tangle source from book and format" }

# Build
build = "cargo build"
build-release = "cargo build --release"

# Run
run = "cargo run --"

# Development
check = "cargo check"
clippy = "cargo clippy"
fmt = "cargo fmt"
fmt-check = "cargo fmt --check"

# CI
lint = { cmd = "cargo clippy -- -D warnings", description = "Strict clippy lint (CI)" }

# Smoke tests
smoke-test-help = { cmd = "cargo run -- --help", depends-on = ["build"], description = "Smoke test: --help" }
smoke-test-init = { cmd = "bash -c 'set -e; rm -rf .tmp-smoke-test; mkdir .tmp-smoke-test; cd .tmp-smoke-test; cargo run -- init ci-test; cat moonshot.toml; cd ..; rm -rf .tmp-smoke-test'", depends-on = ["build"], description = "Smoke test: init" }
smoke-test-build-moonjson = { cmd = "cargo run -- build", cwd = "examples/moonjson", depends-on = ["build"], description = "Smoke test: moonjson build" }
smoke-test = { depends-on = ["smoke-test-help", "smoke-test-init", "smoke-test-build-moonjson"], description = "Run all smoke tests" }

# Release
bump = { cmd = "python scripts/set_version.py", description = "Bump version in pixi.toml and Cargo.toml (e.g. pixi run bump 0.2.0)" }
_release-commit = { cmd = "jj commit -m \"release v$(pixi project version get)\"", depends-on = ["bump"], description = "Commit the version bump" }
_release-push = { cmd = "jj git push", depends-on = ["_release-commit"], description = "Push to remote" }
release = { cmd = "gh workflow run release.yml", depends-on = ["_release-push"], description = "Bump version, commit, push, and trigger release workflow" }

[environments]
default = { solve-group = "default" }
book = { features = ["book"], solve-group = "book" }
