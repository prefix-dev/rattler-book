[workspace]
name = "moonshot"
version = "0.1.0"
description = "A minimal Lua package manager built on rattler"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]
preview = ["pixi-build"]

[package.build.backend]
name = "pixi-build-rust"
version = "0.4.*"

[dev]
moonshot = { path = "." }

[dependencies]

[feature.recording]
# imagemagick isn't packaged for win-64 on conda-forge; recording is
# a unix-only workflow anyway.
platforms = ["osx-arm64", "osx-64", "linux-64"]

[feature.recording.dependencies]
vhs = "*"                         # scripted terminal recordings → GIF (casts/*.tape → casts/*.gif)
imagemagick = "*"                 # used by scripts/record-prep.sh to synthesize photo.jpg

[feature.recording.tasks]
_record-prep = { cmd = "bash scripts/record-prep.sh", depends-on = ["build-release"], description = "Build shot + lumen channel + seed photo.jpg/lumen.lua in /tmp/shot-demo/" }
_record-install-and-run = { cmd = "vhs casts/install-and-run.tape", depends-on = ["_record-prep"], description = "Record casts/install-and-run.gif" }
_record-build = { cmd = "vhs casts/build.tape", depends-on = ["_record-prep"], description = "Record casts/build.gif" }

[feature.book.dependencies]
python = ">=3.11"

[feature.book.pypi-dependencies]
mkdocs-material = ">=9.0"
mkdocs-redirects = ">=1.2"
entangled-cli = ">=2.0"
mkdocs-entangled-plugin = { git = "https://github.com/tdejager/mkdocs-plugin.git" }
mkdocs-print-site-plugin = ">=2.0"
mkdocs-panzoom-plugin = ">=0.5"

[feature.book.tasks]
_strip-markers = { cmd = """python -c "
import pathlib, re
for f in pathlib.Path('src').rglob('*.rs'):
    t = f.read_text()
    t2 = re.sub(r'[ ]*// ~/~ [^\\n]*\\n', '', t)
    if t2 != t: f.write_text(t2); print(f'  stripped {f}')
" """, description = "Remove // ~/~ marker comments from source files" }
_fix-markers = { cmd = "python scripts/fix-markers.py", description = "Restore entangled marker indentation after cargo fmt" }
_generate-manifest = { cmd = "python scripts/generate_source_manifest.py", inputs = ["scripts/generate_source_manifest.py", "book/src/**/*.md", "src/**/*.rs", "src/**/*.lua", "Cargo.toml", "examples/**/*"], outputs = ["book/src/source-manifest.json"], description = "Generate source code manifest for file viewer" }
book-build = { cmd = "mkdocs build", cwd = "book", env = { PYTHONPATH = "." }, depends-on = ["_tangle", "_generate-manifest"] }
book-serve = { cmd = "mkdocs serve --livereload --watch-theme -w src/stylesheets", cwd = "book", env = { PYTHONPATH = "." }, depends-on = ["_tangle", "_generate-manifest"] }
_tangle = { cmd = "entangled tangle --force", description = "Extract code blocks from the book into source files" }
stitch = { cmd = "entangled stitch", description = "Update the book from source file edits" }
watch = { cmd = "entangled watch", description = "Watch for changes and keep book and source files in sync" }

[tasks]
# Tangle source from book (do NOT fmt after tangle — the book is the source of truth)
tangle = { depends-on = [{ task = "_tangle", environment = "book" }], description = "Tangle source from book" }

# Strip entangled markers (cosmetic, one-way — breaks stitch)
strip-markers = { depends-on = [{ task = "_strip-markers", environment = "book" }], description = "Remove // ~/~ marker comments from source files" }

# Build
build = "cargo build"
build-release = "cargo build --release"

# Run shot cli
shot = "cargo run --"

# Development
check = "cargo check"
clippy = "cargo clippy"
_cargo-fmt = "cargo fmt"
fmt = { depends-on = ["_cargo-fmt", { task = "_fix-markers", environment = "book" }], description = "Format code and restore entangled marker indentation" }
fmt-check = "cargo fmt --check"

# CI
lint = { cmd = "cargo clippy -- -D warnings", description = "Strict clippy lint (CI)" }

# Smoke test (does the binary start?)
smoke-test = { cmd = "cargo run -- --help", depends-on = ["build"], description = "Smoke test: --help" }

# Unit tests
unit-test-lock = { cmd = "cargo test lock", depends-on = ["build"], description = "Unit test: lock roundtrip" }

# Integration tests
integration-test-init = { cmd = "rm -rf .tmp-smoke-test && mkdir .tmp-smoke-test && cd .tmp-smoke-test && cargo run -- init ci-test && cat moonshot.toml && cd .. && rm -rf .tmp-smoke-test", depends-on = [
  "build"
], description = "Integration test: init" }
integration-test-init-library = { cmd = "rm -rf .tmp-smoke-lib && mkdir .tmp-smoke-lib && cd .tmp-smoke-lib && cargo run -- init my-lib --library && cat moonshot.toml && cd .. && rm -rf .tmp-smoke-lib", depends-on = [
  "build"
], description = "Integration test: init --library" }
integration-test-add = { cmd = "rm -rf .tmp-smoke-add && mkdir .tmp-smoke-add && cd .tmp-smoke-add && cargo run -- init add-test && cargo run -- add luarocks \"lua >=5.4\" && grep luarocks moonshot.toml && grep lua moonshot.toml && cd .. && rm -rf .tmp-smoke-add", depends-on = [
  "build"
], description = "Integration test: add" }
integration-test-search = { cmd = "cargo run -- search lua", depends-on = ["build"], description = "Integration test: search" }
integration-test-lock = { cmd = "cargo run -- lock", cwd = "examples/moonjson", depends-on = ["build"], description = "Integration test: lock CLI" }
integration-test-build = { cmd = "cargo run -- build", cwd = "examples/moonjson", depends-on = [
  "build"
], description = "Integration test: moonjson build" }
integration-test-install-and-run = { cmd = "rm -rf .tmp-smoke-run && mkdir .tmp-smoke-run && cd .tmp-smoke-run && cargo run -- init run-test && cargo run -- add lua && cargo run -- install && cargo run -- run lua -e \"print('ok')\" && cd .. && rm -rf .tmp-smoke-run", depends-on = [
  "build"
], description = "Integration test: install + run lifecycle" }

# Aggregate: run everything
test = { depends-on = [
  "smoke-test",
  "unit-test-lock",
  "integration-test-init",
  "integration-test-init-library",
  "integration-test-add",
  "integration-test-search",
  "integration-test-lock",
  "integration-test-build",
  "integration-test-install-and-run"
], description = "Run all tests" }

# Release
bump = { cmd = "python scripts/set_version.py", description = "Bump version in pixi.toml and Cargo.toml (e.g. pixi run bump 0.2.0)" }
release = { cmd = "gh workflow run release.yml", description = "Bump version, commit, push, and trigger release workflow" }

# Blog recordings (VHS .gif files in casts/)
record-install-and-run = { depends-on = [{ task = "_record-install-and-run", environment = "recording" }], description = "Record casts/install-and-run.gif" }
record-build = { depends-on = [{ task = "_record-build", environment = "recording" }], description = "Record casts/build.gif" }
record-casts = { depends-on = ["record-install-and-run", "record-build"], description = "Record both .gif files for the blog" }

[environments]
default = { solve-group = "default" }
book = { features = ["book"], solve-group = "book" }
recording = { features = ["recording"], solve-group = "default" }
