# hello-moon — example app demonstrating moonshot
#
# Build the library packages first (from the examples/ directory):
#
#   cd examples/moonjson     && shot build --output-dir ../channel
#   cd examples/mooncolor    && shot build --output-dir ../channel
#   cd examples/moontemplate && shot build --output-dir ../channel
#
# Then install and run:
#
#   cd examples/hello-moon
#   shot install
#   shot run lua bin/hello-moon.lua
#   shot run lua bin/hello-moon.lua json

[project]
name        = "hello-moon"
version     = "0.1.0"
license     = "MIT"
description = "Demo app: searches a package DB using moonjson, mooncolor, moontemplate"
channels    = ["conda-forge", "../channel"]   # ../channel = locally built packages

[dependencies]
lua          = ">=5.4"
moonjson     = "*"
mooncolor    = "*"
moontemplate = "*"

[build]
script = "build.lua"
noarch = true
